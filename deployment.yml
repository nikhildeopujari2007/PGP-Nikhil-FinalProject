kind: Deployment
apiVersion: apps/v1
metadata:
  name: pgp-kubeserve
spec:
  replicas: 2
  minReadySeconds: 10 # wait for 45 sec before going to deploy next pod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  
      maxSurge: 1        # max number of pods to run for the deployment
  selector:
    matchLabels:
      app: pgp-kubeserve
  template:
    metadata:
      name: pgp-kubeserve
      labels:
        app: pgp-kubeserve
    spec:
      containers:
       - name: app
         image: nikhildeopujari2007/pgp-kubedockerimage:4
         ports:
           - containerPort: 8080
         env:
           - name: PORT
             value: "8080"
---
kind: Service
apiVersion: v1
metadata:
   name: pgp-kubeserve-svc
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
  selector: 
    app: pgp-kubeserve
