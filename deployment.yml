apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgp-kube
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pgp-kube
  template:
    metadata:
      labels:
        app: pgp-kube
    spec:
      containers:
        - name: pgp-kube-docker
          image: nikhildeopujari2007/pgp-kubedockerimage
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: pgp-kube
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: pgp-kube
